<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futsal Elite | Onde a Técnica vence a Força</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="a11y-bar" role="complementary">
        <button id="contrast-toggle" aria-label="Modo de Alto Contraste">🌓 Contraste</button>
        <button id="font-up" aria-label="Aumentar texto">A+</button>
        <button id="font-down" aria-label="Diminuir texto">A-</button>
    </div>

    <header role="banner">
        <nav class="navbar" aria-label="Navegação Principal">
            <div class="logo">FUTSAL<span>PRO</span></div>
            <ul>
                <li><a href="#galeria">Equipamentos</a></li>
                <li><a href="#fundamentos">Fundamentos</a></li>
                <li><a href="#contato">Inscrições</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero scroll-reveal">
            <div class="hero-content">
                <h1>Domine a Quadra com Maestria</h1>
                <p>O futsal exige raciocínio rápido e drible curto. Você está pronto?</p>
                <a href="#galeria" class="btn-cta">Ver Destaques</a>
            </div>
        </section>

        <section id="galeria" class="scroll-reveal">
            <h2>Destaques da Temporada</h2>
            <div id="gallery-container" class="grid-main">
                </div>
        </section>

        <section id="fundamentos" class="scroll-reveal">
            <h2>Fundamentos Essenciais</h2>
            <div id="accordion-root">
                </div>
        </section>
    </main>

    <footer role="contentinfo">
        <p>© 2024 Futsal Elite - Educação Digital e Esportiva</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
